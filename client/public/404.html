<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PXLZ Engine</title>
    <script>
        // GitHub Pages SPA fallback
        // Redirect 404s to index.html with the original path as a query parameter
        const path = window.location.pathname;
        const redirect = path + window.location.search;
        sessionStorage.redirect = redirect;
        window.location.href = '/pxlz-engine/';
    </script>
</head>
<body></body>
</html>
